<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iron Gym Fitness Calculator India - BMI, Calories & Diet Plan</title>

<meta name="description" content="Free fitness tools in India: BMI calculator, calories calculator, diet plan and gym workout guide.">
<meta name="keywords" content="fitness calculator india, gym workout, bmi calculator, weight loss, diet plan">
<meta name="author" content="Akshit Parashar">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:25px 10px;
  background:#111;
}

/* BIG TITLE */
.title{
  font-size:28px;
  font-weight:bold;
  background: linear-gradient(90deg, #00e6e6, #00ff99, #00e6e6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:0 0 15px rgba(0,255,255,0.4);
  letter-spacing:2px;
}

/* SUBTITLE */
.subtitle{
  font-size:14px;
  color:#aaa;
  margin-top:5px;
}

/* HERO */
.hero{
  text-align:center;
  padding:15px;
}

.hero h1{
  color:#00e6e6;
  font-size:20px;
}

/* LAYOUT */
.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

/* CARD */
.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  width:90%;
  max-width:340px;
}

input, select{
  width:95%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  background:#00e6e6;
  border:none;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

.result{
  margin-top:10px;
  color:#ffd700;
  font-size:14px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#111;
  margin-top:30px;
  border-top:1px solid #333;
  font-size:13px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <div class="title">IRON GYM FITNESS CALCULATOR INDIA 💪</div>
  <div class="subtitle">BMI • Calories • Diet Plan • Body Fat Calculator</div>
</header>

<div class="hero">
  <h1>Free Smart Fitness Tools for Everyone</h1>
</div>

<!-- TOOLS -->
<div class="container">

<!-- BMI -->
<div class="card">
<h3>BMI Calculator 🧮</h3>
<input id="w" placeholder="Weight (kg)">
<input id="h" placeholder="Height (cm)">
<button onclick="bmi()">Calculate BMI</button>
<div class="result" id="bmiRes"></div>
</div>

<!-- CALORIES -->
<div class="card">
<h3>Calories Calculator 🔥</h3>
<input id="age" placeholder="Age">
<input id="weight" placeholder="Weight (kg)">
<button onclick="calories()">Calculate</button>
<div class="result" id="calRes"></div>
</div>

<!-- DIET -->
<div class="card">
<h3>Weekly Diet Plan 🍎</h3>

<select id="day">
<option value="mon">Monday</option>
<option value="tue">Tuesday</option>
<option value="wed">Wednesday</option>
<option value="thu">Thursday</option>
<option value="fri">Friday</option>
<option value="sat">Saturday</option>
<option value="sun">Sunday</option>
</select>

<button onclick="diet()">Get Diet Plan</button>
<div class="result" id="dietRes"></div>
</div>

</div>

<footer>
AKSHIT PARASHAR PVT. LTD <br>
© 2026 Iron Gym Fitness Calculator India
</footer>

<script>

/* BMI */
function bmi(){
let w=document.getElementById("w").value;
let h=document.getElementById("h").value;
h=h/100;
let b=w/(h*h);
document.getElementById("bmiRes").innerText="BMI: "+b.toFixed(2);
}

/* CALORIES */
function calories(){
let age=document.getElementById("age").value;
let w=document.getElementById("weight").value;

let cal=(10*w + 6.25*170 - 5*age + 5);

document.getElementById("calRes").innerText=
"Calories: "+Math.round(cal);
}

/* DIET */
function diet(){

let day=document.getElementById("day").value;

let plans={
mon:"Eggs + Milk (20g protein)",
tue:"Oats + Banana (15g protein)",
wed:"Chicken + Rice (35g protein)",
thu:"Paneer + Roti (25g protein)",
fri:"Dal + Rice (20g protein)",
sat:"Chicken + Salad (30g protein)",
sun:"Cheat Day 😎"
};

document.getElementById("dietRes").innerText=plans[day];
}

</script>

</body>
</html>
